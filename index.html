<!DOCTYPE html>
<html>
<head>
<title>Kjepphest World 🐴</title>
<style>
body { font-family: Arial; background: #f2f2ff; text-align: center; padding: 30px; }
h1 { color: #6a3ea1; }
.card { background: white; padding: 20px; margin: 20px auto; width: 300px; border-radius: 15px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
button { padding: 10px 15px; border: none; border-radius: 10px; background: #6a3ea1; color: white; cursor: pointer; }
button:hover { background: #532d7f; }
</style>
</head>
<body>
<h1>Velkommen til Kjepphest World 🐴</h1>

<div class="card">
<p>Her kan du lære om kjepphestar, triks, og konkurransar!</p>
<button onclick="alert('Du hoppa eit hinder! 🐴💨')">Hopp hinder</button>
</div>

<div class="card">
<p>Tips: Tren 10 min kvar dag for å bli proff 😎</p>
</div>

</body>
</html>
