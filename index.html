<html>
<head>
<title>Spel 🐴</title>
<style>
body { font-family: Arial; background: #f2f2ff; text-align: center; padding: 30px; }
.card { background: white; padding: 20px; margin: 20px auto; width: 300px; border-radius: 15px; }
button { padding: 10px; background: #6a3ea1; color: white; border: none; border-radius: 10px; }
</style>
</head>

<body>

<h1>🎮 Hopp hinder spel</h1>

<div class="card">
<p id="text">Trykk for å hoppe!</p>
<button onclick="jump()">Hopp 🐴</button>
</div>

<a href="index.html"><button>Tilbake</button></a>

<script>
function jump() {
  let rand = Math.random();
  if (rand > 0.5) {
    document.getElementById("text").innerHTML = "Du hoppa hinderet! 🐴💨";
  } else {
    document.getElementById("text").innerHTML = "Du datt av 😭 prøv igjen!";
  }
}
</script>

</body>
