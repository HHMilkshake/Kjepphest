<!DOCTYPE html>
<html>
<head>
<title>Spel 🐴</title>

<style>
body {
  font-family: Arial;
  background: #f2f2ff;
  text-align: center;
  padding: 30px;
}

.track {
  width: 320px;
  height: 120px;
  background: white;
  margin: 20px auto;
  border-radius: 15px;
  position: relative;
  overflow: hidden;
}

.horse {
  position: absolute;
  left: 10px;
  top: 40px;
  font-size: 35px;
  transition: 0.4s;
}

.rock {
  position: absolute;
  left: 140px;
  top: 45px;
  font-size: 30px;
}

.star {
  position: absolute;
  left: 260px;
  top: 40px;
  font-size: 35px;
}

button {
  padding: 10px;
  background: #6a3ea1;
  color: white;
  border: none;
  border-radius: 10px;
  margin: 5px;
}

#confetti {
  display: none;
  font-size: 30px;
  margin-top: 10px;
}
</style>

</head>

<body>

<h1>🎮 Hopp over steinen!</h1>

<div class="track">
  <div id="horse" class="horse">🐴</div>
  <div class="rock">🪨</div>
  <div class="star">⭐</div>
</div>

<p id="text">Trykk for å hoppe!</p>

<button onclick="jump()">Hopp</button>
<button onclick="reset()">Restart</button>

<div id="confetti">🎉🎉🎉 DU KOM I MÅL! 🎉🎉🎉</div>

<br>
<a href="index.html"><button>⬅ Tilbake</button></a>

<script>
let pos = 10;

function jump() {
  let horse = document.getElementById("horse");
  let text = document.getElementById("text");

  pos += 60;
  horse.style.left = pos + "px";

  if (pos >= 240) {
    text.innerHTML = "Du nådde målet! 🏆";
    document.getElementById("confetti").style.display = "block";
  } else {
    text.innerHTML = "Du hoppa fram! 🐴💨";
  }
}

function reset() {
  pos = 10;
  document.getElementById("horse").style.left = "10px";
  document.getElementById("text").innerHTML = "Trykk for å hoppe!";
  document.getElementById("confetti").style.display = "none";
}
</script>

</body>
</html>
